$accent = rgb(EBEBEB)
$accentAlpha = rgba(203, 203, 118, 0.8)
$text = rgb(EBEBEB)
$background = rgb(EBEBEB)
$font = Monoki Nerd Font

# GENERAL
general {
    disable_loading_bar = true
    hide_cursor = true
}

# BACKGROUND
background {
    monitor =
    path = ~/.config/hypr/wallpapers/allmight-dark.jpg
    blur_passes = 1
}

# TIME
label {
    monitor =
    text = $TIME12
    color = $accent
    font_size = 50
    font_family = $font
    position = 0,-140
    halign = center
    valign = top
}

# DATE
label {
    monitor =
    text = cmd[update:43200000] date +"%A, %d %B %Y"
    color = $text
    font_size = 20
    font_family = $font
    position = 0, -220
    halign = center
    valign = top
}

# INPUT FIELD
input-field {
    monitor =
    size = 235, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb(202018)
    inner_color = rgb(14140c)
    font_color = rgb(e6e3d5)
    fade_on_empty = true
    placeholder_text = $USER
    hide_input = false
    check_color = $accent
    fail_color = rgb(ffb4ab)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    font_family = $font
    capslock_color = rgb(a4d0bd)
    position = 0, 0
    halign = center
    valign = center
}
